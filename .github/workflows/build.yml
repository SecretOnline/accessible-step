name: Build

on:
  push:
    branches:
      - "*"
  pull_request:
    branches:
      - "main"

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Gradle
        uses: SecretOnline/minecraft-actions/setup-mod-gradle@v2

      - name: Build
        run: ./gradlew clean build

      - name: Upload fabric artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-fabric
          path: fabric/build/libs/
          include-hidden-files: true
          if-no-files-found: error

      - name: Upload neoforge artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-neoforge
          path: neoforge/build/libs/
          include-hidden-files: true
          if-no-files-found: error

  gametest:
    name: Run game tests
    runs-on: ubuntu-latest
    needs:
      - build
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends imagemagick xvfb x11-apps

          export DISPLAY=:1
          echo "DISPLAY=:1" >> "$GITHUB_ENV"

          # Minecraft opens to 854x480 by default. No point in having a larger frame buffer.
          sudo Xvfb -ac :1 -screen 0 854x480x24 > /dev/null 2>&1 &
          sleep 1

      - name: Setup Gradle
        uses: SecretOnline/minecraft-actions/setup-mod-gradle@v2

      - name: Run gametests
        run: ./gradlew runClientGameTest --args="-Dfabric.client.gametest.disableNetworkSynchronizer=true"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: client-gametest-screenshots
          path: fabric/build/run/clientGameTest/screenshots/

  get-test-matrix:
    name: Get test matrix
    runs-on: ubuntu-latest
    outputs:
      test-matrix: ${{ steps.get-test-matrix.outputs.test-matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Get versions
        id: get-test-matrix
        uses: SecretOnline/minecraft-actions/get-test-matrix@v2

  live-test:
    name: Test (${{ matrix.loader }}, ${{ matrix.versions.minecraft-version }})
    runs-on: ubuntu-latest
    needs:
      - build
      - get-test-matrix
    strategy:
      matrix:
        versions: ${{ fromJson(needs.get-test-matrix.outputs.test-matrix) }}
        loader:
          - fabric
          - neoforge
      fail-fast: false
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Install apt packages
        run: sudo apt-get update && sudo apt-get install -y xvfb libgl1-mesa-dri mesa-utils imagemagick

      - name: Setup Java ${{ matrix.versions.java-version }}
        id: setup-java
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.versions.java-version }}
          distribution: zulu

      - name: Setup server
        uses: SecretOnline/minecraft-actions/setup-mc-server@v2
        with:
          server-directory: server
          minecraft-version: ${{ matrix.versions.minecraft-version }}
          loader: ${{ matrix.loader }}
          accept-eula: true

      - name: Setup client
        uses: SecretOnline/minecraft-actions/setup-mc-client@v2
        with:
          client-directory: client
          minecraft-version: ${{ matrix.versions.minecraft-version }}
          loader: ${{ matrix.loader }}

      - name: Download mod build artifact
        uses: actions/download-artifact@v8
        with:
          name: build-${{ matrix.loader }}

      - name: Install mod
        run: |
          mkdir -p server/mods
          mkdir -p client/mods

          mod_file=$(ls -1 | grep ".jar" | grep -Ev "\-(sources|shadow|javadoc).jar" | grep -v "\-dev")
          cp $mod_file server/mods/
          cp $mod_file client/mods/

      - name: Install Fabric API
        if: ${{ matrix.loader == 'fabric' }}
        run: |
          fabric_api_url=$(curl -sg -A "secret_online/accessible-step (mc@secretonline.co)" "https://api.modrinth.com/v2/project/P7dR8mSH/version" | jq -r "[.[] | select(.game_versions[] == \"${{ matrix.versions.minecraft-version }}\")][0].files[0].url")

          wget -q -O server/mods/fabric-api.jar "$fabric_api_url"
          cp server/mods/fabric-api.jar client/mods/fabric-api.jar

          mkdir -p server/mods
          mkdir -p client/mods

      - name: Run server
        uses: SecretOnline/minecraft-actions/run-mc-server@v2
        with:
          server-directory: server
          log-file: server/server.log

      - name: Run client
        id: run-client
        uses: SecretOnline/minecraft-actions/run-mc-client@v2
        with:
          client-directory: client
          log-file: client/client.log
          width: 854
          height: 480
          server-address: localhost:25565

      - name: Wait for client to fully join
        run: |
          sleep 10

      - name: Screenshot Minecraft client
        id: screenshot
        uses: SecretOnline/minecraft-actions/screenshot-mc-client@v2
        with:
          display: ${{ steps.run-client.outputs.display }}
          xauthority: ${{ steps.run-client.outputs.xauthority }}
          artifact-name: client-screenshot-${{ matrix.loader }}-${{ matrix.versions.minecraft-version }}
          add-job-summary: "true"

      - name: Upload test artifacts
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: test-logs-${{ matrix.loader }}-${{ matrix.versions.minecraft-version }}
          path: |
            client/client.log
            client/logs/*
            server/server.log
            server/logs/*
          retention-days: 7

      - name: Add PR Comment
        uses: mshick/add-pr-comment@v3
        if: github.event_name == 'pull_request'
        with:
          message-id: "test-screenshot-${{ matrix.loader }}-${{ matrix.versions.minecraft-version }}"
          message: |
            ## Test screenshot (${{ matrix.loader }}, ${{ matrix.versions.minecraft-version }})

            ![client-screenshot-${{ matrix.loader }}-${{ matrix.versions.minecraft-version }}](${{ steps.screenshot.outputs.url }})
