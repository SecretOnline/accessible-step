modLoader = "javafml"
loaderVersion = "${neoforge_loader_version_range}"
license = "${license}"
[[mods]]
modId="${neoforge_mod_id}"
version = "${version}"
displayName = "${mod_name}"
logoFile="assets/${mod_id}/icon.png"
credits="${credits}"
authors = "${mod_author}"
description = '''${description}'''
[[mixins]]
config = "accessible-step.common.mixins.json"
[[dependencies.${neoforge_mod_id}]]
modId = "neoforge"
type="required"
versionRange = "[${neoforge_version},)"
ordering = "NONE"
side = "CLIENT"
[[dependencies.${neoforge_mod_id}]]
modId = "minecraft"
type="required"
versionRange = "${minecraft_version_range}"
ordering = "NONE"
side = "CLIENT"
[mc-publish]
modrinth   = "accessible-step"
curseforge = 1044724
